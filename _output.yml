bookdown::gitbook:
  css: style.css
  config:
    toc:
      collapse: subsection
      scroll_highlight: yes
    toolbar:
      position: fixed
    download: ["pdf"]
  number_sections: true

bookdown::pdf_book:
  latex_engine: pdflatex
  toc: true
  toc_depth: 3
  number_sections: true
  keep_tex: false
